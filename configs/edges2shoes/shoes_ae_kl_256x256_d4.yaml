model:
  class_name: ddm.encoder_decoder.AutoencoderKL
  embed_dim: 3
  lossconfig:
    disc_start: 20001
    kl_weight: 0.000001
    disc_weight: 0.5
  ddconfig:
    double_z: True
    z_channels: 3
    resolution: [ 256, 256 ]
    in_channels: 3
    out_ch: 3
    ch: 128
    ch_mult: [ 1,2,4 ]  # num_down = len(ch_mult)-1
    num_res_blocks: 2
    attn_resolutions: [ ]
    dropout: 0.0
  ckpt_path: "/home/zoushilong/data_57/pretrain_weight/first_stage_models/kl-f4/model.ckpt"

data:
  class_name: ddm.data.Single_dataset
  datafolder_name: 'shoes'
  split: train
  image_size: [256, 256]
  data_root: "/home/zoushilong/data_57/diffusion_data/edges2shoes"
  augment_horizontal_flip: True
  batch_size: 6
  num_workers: 4

trainer:
  gradient_accumulate_every: 2
  lr: !!float 5e-6
  min_lr: !!float 1e-6
  train_num_steps: 70000
  save_and_sample_every: 5000
  log_freq: 200
  resume_milestone: 0
  results_folder: "/home/zoushilong/data_57/diffusion_data/edges2shoes/results_ae_kl_256x256_d4_shoes"
  amp: False
  fp16: False